name: Deploy (Local Self-Hosted Runner)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to production directory
        run: |
          cd /opt/mealie-planner
          git fetch origin main
          git reset --hard origin/main
          git submodule update --init --recursive
          docker compose up -d --build
