<aside id="sidebar" class="sidebar">
    <div class="sidebar-brand"><span class="brand-label">Culinary Companion</span><div class="brand-title">{{ family_name_display }}</div></div>

    <!-- Week Selector Pill Group -->
    <div class="week-pill-group" style="margin-bottom: 1.5rem;">
        <a href="{{ url_for('planning.index', week='current') }}" class="week-pill {% if week == 'current' %}active{% endif %}">Current Week</a>
        <a href="{{ url_for('planning.index', week='next') }}" class="week-pill {% if week == 'next' %}active{% endif %}">Next Week</a>
    </div>
    <nav class="nav-group">
        <button class="nav-item active" id="nav-menu" onclick="switchTab('menu')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Weekly Menu</button>
        <button class="nav-item" id="nav-shopping" onclick="switchTab('shopping')" {% if not is_submitted %}disabled style="opacity: 0.5; cursor: not-allowed;" title="Plan the week first to view the shopping list."{% endif %}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Shopping List</button>
        <button class="nav-item" id="nav-prep" onclick="switchTab('prep')" {% if not is_submitted %}disabled style="opacity: 0.5; cursor: not-allowed;" title="Plan the week first to view the prep guide."{% endif %}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg> Prep Guide</button>
        <div style="margin-top: 1.5rem; margin-bottom: 0.5rem;"><span class="brand-label">Management</span></div>
        <button class="nav-item" onclick="openStaplesModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Manage Staples</button>
        <form action="{{ url_for('shopping.sync') }}" method="POST" onsubmit="showLoading('Recalculating Groceries', 'The chef is re-optimizing your shopping list…')">
            <input type="hidden" name="week" value="{{ week }}">
            <button type="submit" class="nav-item" {% if not is_submitted %}disabled style="opacity: 0.5; cursor: not-allowed;" title="Plan the week first to refresh the list."{% endif %}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Refresh List</button>
        </form>
        <button class="nav-item" id="nav-admin" onclick="switchTab('admin')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Admin Settings</button>
    </nav>
    <div class="sidebar-footer">
        <div class="brand-label">{% if week == 'next' %}Next Week{% else %}Active Week{% endif %}</div>
        <div style="font-size: 0.75rem; color: var(--color-muted); font-weight: 500;">{{ start_date }} &rarr; {{ end_date }}</div>
        <button id="theme-toggle-btn" onclick="toggleTheme()" style="background: none; border: none; color: var(--color-primary); cursor: pointer; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 0.75rem; display: flex; align-items: center; gap: 4px; padding: 0;">
            🌗 Toggle Theme
        </button>
    </div>
</aside>
