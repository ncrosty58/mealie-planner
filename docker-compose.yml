services:
  mealie-planner:
    build: .
    container_name: mealie-planner
    restart: always
    ports:
      - "9926:9926"
    volumes:
      - ./data:/app/data
      # Uncomment the bind mounts below only if you are doing active local development
      # and want to propagate code changes without rebuilds:
      # - ./mealie_planner:/app/mealie_planner:ro
      # - ./mealie-mcp-server:/app/mealie-mcp-server:ro
      # - ./scripts:/app/scripts:ro
    env_file:
      - .env

networks:
  default:
    name: mealie_default
    external: true
